<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <meta
      name="description"
      content="Plan T - Testosterone awareness and optimization"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <title>Plan T</title>

    <!-- 🔥 HARD BLOCK EMERGENT BADGE -->
    <style>
      #emergent-badge {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
        pointer-events: none !important;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <div id="root"></div>

    <!-- 🔥 FORCE REMOVE IF INJECTED BY JS -->
    <script>
      const removeEmergentBadge = () => {
        const badge = document.getElementById("emergent-badge");
        if (badge) {
          badge.remove();
        }
      };

      // Run immediately
      removeEmergentBadge();

      // Run repeatedly in case something re-injects it
      setInterval(removeEmergentBadge, 500);
    </script>
  </body>
</html>
